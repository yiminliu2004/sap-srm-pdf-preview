<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>SAP PDF Preview</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        background: #525659;
        overflow: hidden;
      }

      #content {
        height: 100%;
        position: relative;
        overflow: hidden;
      }
      #content iframe {
        border: 0;
        width: 100%;
        height: 100%;
        display: block;
      }
      #status {
        color: #fff;
        font: 13px/1.4 -apple-system, BlinkMacSystemFont, sans-serif;
        padding: 14px;
        white-space: pre-wrap;
        word-break: break-word;
      }

      /* Floating "open in new window" icon button */
      #popbtn {
        position: fixed;
        top: 66px;
        right: 14px;
        z-index: 2147483647;
        width: 30px;
        height: 30px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(40, 44, 47, 0.85);
        color: #fff;
        border: 0;
        border-radius: 6px;
        cursor: pointer;
        box-shadow: 0 1px 5px rgba(0, 0, 0, 0.45);
      }
      #popbtn:hover {
        background: rgba(60, 64, 67, 0.98);
      }

      /* Image viewer fallback (rotate/zoom/fit/download) */
      #viewer {
        display: flex;
        flex-direction: column;
        height: 100%;
      }
      #toolbar {
        flex: 0 0 auto;
        display: flex;
        gap: 6px;
        align-items: center;
        padding: 6px 8px;
        background: #3b3f42;
        border-bottom: 1px solid #1f2123;
      }
      #toolbar button,
      #toolbar a.tbtn {
        background: #4a4e51;
        color: #fff;
        border: 0;
        border-radius: 4px;
        padding: 6px 10px;
        font-size: 14px;
        line-height: 1;
        cursor: pointer;
        text-decoration: none;
        display: inline-block;
        font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      }
      #toolbar button:hover,
      #toolbar a.tbtn:hover {
        background: #5a5f63;
      }
      #toolbar .spacer {
        flex: 1;
      }
      #stage {
        flex: 1 1 auto;
        overflow: auto;
        text-align: center;
      }
      #imgwrap2 {
        position: relative;
        margin: 8px auto;
      }
      #imgwrap2 img {
        position: absolute;
        left: 0;
        top: 0;
        transform-origin: center center;
        background: #fff;
      }
    </style>
  </head>
  <body>
    <div id="content">
      <div id="status">Click a Download link in SAP to preview the file here…</div>
    </div>
    <script src="panel.js"></script>
  </body>
</html>
